# Puerta de calidad del proyecto en CI: los mismos chequeos que corre
# pre-commit en local (ruff + mypy + pytest; los tests no tocan la red,
# así que no se necesita ningún secreto).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Formato (ruff format)
        run: ruff format --check .

      - name: Tipos (mypy)
        run: mypy src

      - name: Tests (pytest)
        run: pytest
