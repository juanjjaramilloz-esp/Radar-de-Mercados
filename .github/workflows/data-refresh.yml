name: Data refresh

on:
  schedule:
    # Revisa mensualmente; la política interna evita descargar fuentes frescas.
    - cron: "17 08 3 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Ignorar TTL y refrescar las tres fuentes"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tradefit-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restaurar cachés crudos con sidecars de frescura
        uses: actions/cache@v4
        with:
          path: data/raw
          key: tradefit-raw-v1-${{ github.run_id }}
          restore-keys: |
            tradefit-raw-v1-

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Refrescar fuentes vencidas y reconstruir snapshots
        env:
          FORCE_REFRESH: ${{ inputs.force || 'false' }}
        run: |
          if [ "$FORCE_REFRESH" = "true" ]; then
            python -m tradefit.pipeline.refresh --force
          else
            python -m tradefit.pipeline.refresh
          fi

      - name: Puerta de calidad
        run: |
          ruff check .
          ruff format --check .
          mypy src
          pytest

      - name: Publicar cambios en una PR revisable
        id: publish
        run: |
          git add data/processed
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          branch="automation/data-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git commit -m "chore(data): refresh automático de fuentes"
          git push --force origin "HEAD:$branch"

          number=$(gh pr list --state open --head "$branch" --json number --jq '.[0].number')
          body="Refresh automático de Comtrade/WDI/WITS. Incluye manifiestos SHA-256 y pasó ruff, mypy y pytest en el workflow."
          if [ -n "$number" ]; then
            gh pr edit "$number" --title "chore(data): refresh automático de fuentes" --body "$body"
          else
            gh pr create --base main --head "$branch" --title "chore(data): refresh automático de fuentes" --body "$body"
          fi
