# Tema de la app (identidad visual; los secretos van en secrets.toml, gitignored)
[theme]
base = "light"
primaryColor = "#1D4ED8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#0F172A"
font = "sans serif"

# Server: seguro por defecto también detrás de un proxy inverso.
# headless evita el prompt interactivo de bienvenida (cuelga el deploy sin TTY).
# En Render/Cloudflare se debe definir STREAMLIT_BROWSER_SERVER_ADDRESS con
# el dominio público; Streamlit usa esa dirección para validar CORS/XSRF.
[server]
headless = true
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
